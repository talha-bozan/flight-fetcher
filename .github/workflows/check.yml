name: Flight Check

on:
  schedule:
    - cron: "0 */6 * * *"   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip sending emails (logs only)"
        type: boolean
        default: false

permissions:
  contents: write   # to commit updated docs/state.json back to the repo

concurrency:
  group: flight-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flight check
        env:
          # Reusing the existing secret name GMAIL_APP_PASSWORD so the user
          # doesn't have to recreate it — the code now treats this as a
          # generic SMTP password (Brevo by default; see src/config.py).
          SMTP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          PYTHONIOENCODING: utf-8
        run: python -m src.main

      - name: Commit dashboard state
        if: always()
        run: |
          git config user.name "flight-bot"
          git config user.email "actions@github.com"
          git add docs/state.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "dashboard: update state [skip ci]"
            # Retry once on race with another run (rare; concurrency group prevents it usually)
            git push || (git pull --rebase && git push)
          else
            echo "No state changes to commit"
          fi

      - name: Upload diagnostics as artifact (fallback if push fails)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ github.run_number }}
          path: |
            docs/state.json
            last_error.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Write run summary
        if: always()
        run: |
          {
            echo "## Flight Check #${{ github.run_number }}"
            echo ""
            echo "### state.json (latest)"
            echo '```json'
            if [ -f docs/state.json ]; then
              head -c 4000 docs/state.json
            else
              echo "(missing)"
            fi
            echo ""
            echo '```'
            echo ""
            if [ -f last_error.log ]; then
              echo "### ⚠️ last_error.log"
              echo '```'
              cat last_error.log
              echo '```'
            else
              echo "### last_error.log: (no errors)"
            fi
            echo ""
            echo "**Dashboard:** https://talha-bozan.github.io/flight-fetcher/"
          } >> "$GITHUB_STEP_SUMMARY"
