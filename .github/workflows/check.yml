name: Flight Check

on:
  schedule:
    - cron: "0 */6 * * *"   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip sending emails (logs only)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: flight-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Restore state cache (dedupe history)
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: flight-state-${{ github.run_id }}
          restore-keys: |
            flight-state-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flight check
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          PYTHONIOENCODING: utf-8
        run: python -m src.main

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: flight-state-${{ github.run_id }}

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ github.run_number }}
          path: |
            state.json
            last_error.log
          if-no-files-found: ignore
          retention-days: 30

      - name: Write run summary
        if: always()
        run: |
          {
            echo "## Flight Check #${{ github.run_number }}"
            echo ""
            echo "### state.json"
            echo '```json'
            if [ -f state.json ]; then
              cat state.json
            else
              echo "(file missing)"
            fi
            echo '```'
            echo ""
            if [ -f last_error.log ]; then
              echo "### ⚠️ last_error.log"
              echo '```'
              cat last_error.log
              echo '```'
            else
              echo "### last_error.log: (no errors)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
